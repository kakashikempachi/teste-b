<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JBLAR - Dashboards Diretoria</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://via.placeholder.com/192">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; }

        body { background-color: #030812; display: flex; justify-content: center; align-items: center; min-height: 100vh; width: 100vw; overflow-x: hidden; }

        .app-wrapper { width: 100%; max-width: 450px; min-height: 100vh; position: relative; overflow: hidden; }

        @media (min-width: 480px) { .app-wrapper { min-height: 850px; height: 90vh; border-radius: 30px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.9); margin: 20px 0; border: 1px solid #333; } }

        /* --- TELAS E NAVEGAÇÃO --- */
        #tela-menu {
            height: 100%;
            background-image: url('jblar%20diretoria.png'); 
            background-size: cover; background-position: center top; background-repeat: no-repeat;
            display: flex; flex-direction: column; justify-content: flex-end; padding: 20px; padding-bottom: 8vh;
            position: absolute; top: 0; left: 0; width: 100%;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        .tela-relatorio {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at top, #1a2a47 0%, #050b14 100%); 
            z-index: 10; overflow-y: auto; padding: 20px; padding-bottom: 40px;
            transform: translateX(100%); opacity: 0; pointer-events: none;
            transition: transform 0.3s ease, opacity 0.3s ease;
            display: flex; flex-direction: column; justify-content: flex-start;
        }

        .view-active { transform: translateX(0) !important; opacity: 1 !important; pointer-events: all !important; }
        .view-hidden-left { transform: translateX(-100%) !important; opacity: 0 !important; pointer-events: none !important; }

        /* HEADER E EXPORT */
        .report-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; gap: 8px; }
        .btn-voltar { background: rgba(5, 12, 25, 0.8); border: 1px solid rgba(212, 175, 55, 0.5); color: #d4af37; padding: 8px 12px; border-radius: 8px; font-weight: bold; cursor: pointer; backdrop-filter: blur(5px); }
        .export-group { display: flex; gap: 5px; }
        .btn-export { background: rgba(255,255,255,0.05); border: 1px solid rgba(212, 175, 55, 0.4); color: #fff; padding: 8px; border-radius: 8px; font-size: 0.7rem; cursor: pointer; font-weight: bold; }
        .btn-export:active { background: #d4af37; color: #000; }
        .report-title { color: #d4af37; font-size: 0.9rem; text-shadow: 1px 2px 2px rgba(0, 0, 0, 0.9); text-align: right; font-weight: bold; flex: 1; }

        /* BOTÕES MENU */
        .buttons-container { display: flex; flex-direction: column; gap: 14px; }
        .menu-btn { display: flex; align-items: center; width: 100%; border-radius: 12px; padding: 14px 18px; cursor: pointer; text-align: left; border: none; transition: transform 0.1s; background: linear-gradient(135deg, rgba(212, 175, 55, 0.05) 0%, rgba(5, 12, 25, 0.6) 100%); border: 1px solid rgba(212, 175, 55, 0.7); backdrop-filter: blur(8px); }
        .menu-btn:active { transform: scale(0.97); }
        .btn-icon { font-size: 1.8rem; margin-right: 15px; width: 35px; text-align: center; }
        .btn-text h2 { font-size: 1.05rem; font-weight: 700; color: #d4af37; margin-bottom: 2px; }
        .btn-text p { font-size: 0.75rem; color: #b0c0d0; }

        /* ABAS E FILTROS */
        .tabs-container { display: flex; background: rgba(0,0,0,0.4); border-radius: 10px; margin-bottom: 15px; padding: 4px; border: 1px solid rgba(212, 175, 55, 0.3); }
        .tab-btn { flex: 1; padding: 10px; text-align: center; color: #a0aab5; background: transparent; border: none; border-radius: 8px; font-weight: bold; font-size: 0.85rem; cursor: pointer; transition: all 0.2s; }
        .tab-btn.active { background: linear-gradient(135deg, rgba(212, 175, 55, 0.2) 0%, rgba(212, 175, 55, 0.05) 100%); color: #d4af37; }

        .date-filter-box { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 15px; background: rgba(5, 12, 25, 0.6); padding: 10px; border-radius: 10px; border: 1px solid rgba(212, 175, 55, 0.2); }
        .date-input-group { display: flex; flex-direction: column; flex: 1; }
        .date-input-group label { font-size: 0.65rem; color: #a0aab5; margin-bottom: 2px; text-transform: uppercase; }
        .date-input { background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(212, 175, 55, 0.4); color: #d4af37; padding: 8px; border-radius: 6px; outline: none; font-size: 0.8rem; color-scheme: dark; width: 100%; }
        .btn-filtrar { background: #d4af37; color: #000; border: none; border-radius: 6px; padding: 0 15px; font-weight: bold; font-size: 0.8rem; cursor: pointer; height: 32px; margin-top: 14px; }

        /* ORGANIZAR POR */
        .sort-container { margin-bottom: 15px; background: rgba(5, 12, 25, 0.4); padding: 10px; border-radius: 10px; border: 1px solid rgba(212, 175, 55, 0.15); }
        .sort-label { font-size: 0.7rem; color: #a0aab5; margin-bottom: 8px; text-transform: uppercase; font-weight: bold; }
        .sort-buttons { display: flex; gap: 5px; flex-wrap: wrap; }
        .sort-btn { flex: 1; min-width: 60px; padding: 8px 2px; text-align: center; color: #a0aab5; background: rgba(0,0,0,0.4); border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 6px; font-weight: bold; font-size: 0.7rem; cursor: pointer; }
        .sort-btn.active { background: #d4af37; color: #000; border-color: #d4af37; }

        /* SELECT CUSTOM */
        .custom-select-wrapper { position: relative; margin-top: 10px; display: none; }
        .custom-select-display { background: rgba(5, 12, 25, 0.9); border: 1px solid rgba(212, 175, 55, 0.5); color: #d4af37; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; text-align: center; }
        .custom-select-options { position: absolute; top: 100%; left: 0; right: 0; background: rgba(5, 12, 25, 0.98); border: 1px solid rgba(212, 175, 55, 0.4); border-top: none; border-radius: 0 0 8px 8px; max-height: 200px; overflow-y: auto; z-index: 100; display: none; }
        .custom-option { padding: 12px; color: #a0aab5; cursor: pointer; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .custom-option.selected { background: rgba(212, 175, 55, 0.15); color: #d4af37; font-weight: bold; }

        /* CARDS E KPI */
        .glass-card { background: linear-gradient(135deg, rgba(255, 255, 255, 0.03) 0%, rgba(5, 12, 25, 0.7) 100%); border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 12px; padding: 15px; margin-bottom: 12px; backdrop-filter: blur(10px); color: #e0e5ec; }
        .card-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; border-bottom: 1px solid rgba(212, 175, 55, 0.2); padding-bottom: 8px; margin-bottom: 8px; }
        .card-title { font-size: 0.95rem; font-weight: bold; color: #fff; flex: 1; }
        .toggle-arrow { color: #d4af37; font-size: 1rem; transition: transform 0.3s; }
        .kpi-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .kpi-label { font-size: 0.85rem; color: #a0aab5; }
        .kpi-value { font-size: 1.15rem; font-weight: bold; color: #d4af37; }
        .sub-agent-row { border-bottom: 1px dashed rgba(255,255,255,0.1); padding: 8px 0; display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; }
        .section-title { color: #d4af37; font-size: 0.9rem; font-weight: bold; margin: 15px 0 10px 0; text-transform: uppercase; }

        /* PÓDIO */
        .podium-wrapper { display: flex; align-items: flex-end; justify-content: center; gap: 6px; margin: 30px 0 40px 0; height: 180px; }
        .podium-col { display: flex; flex-direction: column; align-items: center; justify-content: flex-end; flex: 1; min-width: 0; width: 33.33%; max-width: 33.33%; position: relative; }
        .podium-col-1 { order: 2; z-index: 10; }
        .podium-col-2 { order: 1; z-index: 5; }
        .podium-col-3 { order: 3; z-index: 1; }
        .podium-name { font-size: 0.70rem; font-weight: bold; color: #fff; text-align: center; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; height: 2.4em; line-height: 1.2; width: 100%; margin-bottom: 4px; }
        .podium-metric { font-size: 0.7rem; color: #d4af37; background: rgba(0,0,0,0.6); padding: 4px; border-radius: 4px; text-align: center; width: 95%; line-height: 1.3; }
        .podium-step { width: 100%; border-radius: 6px 6px 0 0; display: flex; justify-content: center; align-items: center; font-weight: bold; color: #000; font-size: 1.5rem; }
        .podium-1 { height: 100px; background: linear-gradient(#fceabb, #f8b500); border: 1px solid #fff; }
        .podium-2 { height: 70px; background: linear-gradient(#e0e5ec, #a0aab5); }
        .podium-3 { height: 50px; background: linear-gradient(#cd7f32, #8b5a2b); }

        /* RANKING LIST */
        .ranking-list-item { display: flex; align-items: center; background: rgba(255,255,255,0.02); border: 1px solid rgba(212,175,55,0.1); border-radius: 10px; padding: 12px; margin-bottom: 8px; }
        .rank-pos { width: 35px; font-weight: bold; color: #a0aab5; font-size: 1.1rem; }
        .rank-name { color: #fff; font-weight: bold; font-size: 0.9rem; flex: 1; white-space: normal; line-height: 1.2; }
        .rank-metrics { color: #d4af37; font-size: 0.85rem; font-weight: bold; text-align: right; }

        .loading { text-align: center; color: #d4af37; margin-top: 50px; font-weight: bold; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% {opacity:0.4} 50% {opacity:1} 100% {opacity:0.4} }
    </style>
</head>
<body>

    <div class="app-wrapper">
        <main id="tela-menu">
            <div class="buttons-container">
                <button class="menu-btn" onclick="abrirTela('operacao')">
                    <span class="btn-icon">📈</span>
                    <div class="btn-text"><h2>Operação Comercial</h2><p>Acordos e Inadimplência</p></div>
                </button>
                <button class="menu-btn" onclick="abrirTela('tallk')">
                    <span class="btn-icon">🎧</span>
                    <div class="btn-text"><h2>Atendimento Tallk</h2><p>TMA e Conversão Voz</p></div>
                </button>
                <button class="menu-btn" onclick="abrirTela('ranking')">
                    <span class="btn-icon">🏆</span>
                    <div class="btn-text"><h2>Ranking</h2><p>Líderes e Posições</p></div>
                </button>
            </div>
        </main>

        <main id="tela-operacao" class="tela-relatorio">
            <div class="report-header">
                <button class="btn-voltar" onclick="voltarParaMenu()">‹ Voltar</button>
                <div class="export-group">
                    <button class="btn-export" onclick="exportarExcel()">EXCEL</button>
                    <button class="btn-export" onclick="exportarPDF('tela-operacao')">PDF</button>
                </div>
                <h2 class="report-title">Operação</h2>
            </div>
            <div id="loading-operacao" class="loading">Sincronizando base... ⏳</div>
            <div id="conteudo-operacao" style="display: none;">
                <div class="tabs-container">
                    <button id="aba-agentes" class="tab-btn active" onclick="mudarAbaOp('agentes')">👤 Agentes</button>
                    <button id="aba-empreendimentos" class="tab-btn" onclick="mudarAbaOp('empreendimentos')">🏢 Empreend.</button>
                </div>
                <div class="date-filter-box" id="filtro-data-op">
                    <div class="date-input-group"><label>De</label><input type="date" id="data-inicio-op" class="date-input"></div>
                    <div class="date-input-group"><label>Até</label><input type="date" id="data-fim-op" class="date-input"></div>
                    <button class="btn-filtrar" onclick="renderizarOperacao()">Filtrar</button>
                </div>
                <div class="sort-container" id="area-sort-op">
                    <div class="sort-label">Organizar Por:</div>
                    <div class="sort-buttons">
                        <button id="btn-sort-valor" class="sort-btn active" onclick="mudarSortOp('valor')">💰 Valor</button>
                        <button id="btn-sort-acordos" class="sort-btn" onclick="mudarSortOp('acordos')">🔢 Acordos</button>
                        <button id="btn-sort-mes" class="sort-btn" onclick="mudarSortOp('mes')">📅 Mês a Mês</button>
                        <button id="btn-sort-individual" class="sort-btn" onclick="mudarSortOp('individual')">👤 Agente</button>
                    </div>
                    <div class="custom-select-wrapper" id="select-individual-wrapper">
                        <div class="custom-select-display" onclick="toggleCustomSelect('list-agentes-op')">Selecione um Agente ▼</div>
                        <div class="custom-select-options" id="list-agentes-op"></div>
                    </div>
                </div>
                <div id="lista-operacao"></div>
            </div>
        </main>

        <main id="tela-tallk" class="tela-relatorio">
            <div class="report-header">
                <button class="btn-voltar" onclick="voltarParaMenu()">‹ Voltar</button>
                <div class="export-group">
                    <button class="btn-export" onclick="exportarExcel()">EXCEL</button>
                    <button class="btn-export" onclick="exportarPDF('tela-tallk')">PDF</button>
                </div>
                <h2 class="report-title">Atendimento Tallk</h2>
            </div>
            <div id="loading-tallk" class="loading">Carregando Tallk... ⏳</div>
            <div id="conteudo-tallk" style="display: none;">
                <div class="date-filter-box">
                    <div class="date-input-group"><label>De</label><input type="date" id="data-inicio-tk" class="date-input"></div>
                    <div class="date-input-group"><label>Até</label><input type="date" id="data-fim-tk" class="date-input"></div>
                    <button class="btn-filtrar" onclick="renderizarTallk()">Filtrar</button>
                </div>
                <div id="lista-tallk"></div>
            </div>
        </main>

        <main id="tela-ranking" class="tela-relatorio">
            <div class="report-header">
                <button class="btn-voltar" onclick="voltarParaMenu()">‹ Voltar</button>
                <div class="export-group">
                    <button class="btn-export" onclick="exportarPDF('tela-ranking')">PDF</button>
                </div>
                <h2 class="report-title">Ranking Geral</h2>
            </div>
            <div id="loading-ranking" class="loading">Apurando Posições... ⏳</div>
            <div id="conteudo-ranking" style="display: none;">
                <div class="tabs-container">
                    <button id="aba-rank-ag" class="tab-btn active" onclick="mudarAbaRank('agentes')">👤 Agentes</button>
                    <button id="aba-rank-em" class="tab-btn" onclick="mudarAbaRank('empreendimentos')">🏢 Empreend.</button>
                </div>
                <div class="date-filter-box">
                    <div class="date-input-group"><label>Início</label><input type="date" id="data-inicio-rk" class="date-input"></div>
                    <div class="date-input-group"><label>Fim</label><input type="date" id="data-fim-rk" class="date-input"></div>
                    <button class="btn-filtrar" onclick="renderizarRanking()">Filtrar</button>
                </div>
                <div id="area-podio"></div>
                <div id="lista-ranking"></div>
            </div>
        </main>
    </div>

    <script>
        // CONFIGURAÇÕES GLOBAIS
        const API_URL_OP = 'https://script.google.com/macros/s/AKfycbym4gyENjA6c98WgGwV7pj0EXZcZOLT9s84HL1S_JGzHJ3R-3izMw1QZJkw6vi17n4WsQ/exec';
        const API_URL_TK = 'https://script.google.com/macros/s/AKfycbwwpzVC4-Es3UJKSxlN0liYxevDd_fugK0SoRX259FvoCe7jBliqrrLiY7mycFH07fx3A/exec';
        const API_URL_CL = 'https://script.google.com/macros/s/AKfycbw_paRkhkGz5hCRSyUkgKfDzHICI0lrvwFjALFiuGrs894mQt9D4bRzSMUHOKKti7g/exec';

        let db = { op: [], tk: [], cl: [] };
        let moduloAtivo = '';
        let abaOpAtiva = 'agentes';
        let sortOpAtivo = 'valor';
        let agenteOpSel = '';
        let abaRankAtiva = 'agentes';

        const fmtMoeda = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' });
        const nomesMeses = ['Erro','Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

        // --- MÁSCARAS DE LIMPEZA GLOBAIS ---
        function limparNomeGlobal(nome) {
            if (!nome) return "NÃO INFORMADO";
            let n = String(nome).toUpperCase();
            n = n.replace(/CONDOMÃNIO/g, 'CONDOMÍNIO');
            n = n.replace(/BUTANTAN/g, 'BUTANTÃ');
            n = n.replace(/[^\w\s&ÁÀÂÃÉÈÊÍÌÎÓÒÔÕÚÙÛÇ-]/g, ''); // Remove lixo mantendo acentos e &
            return n.trim();
        }

        function mascaraNomeCurto(nome) {
            let n = limparNomeGlobal(nome);
            n = n.replace(/EMPREENDIMENTO:?\s*/ig, '');
            n = n.replace(/CONDOM[ÍI]NIO\s+RESIDENCIAL\s+/ig, '');
            n = n.replace(/CONDOM[ÍI]NIO\s+/ig, '');
            n = n.replace(/MEU\s+PLANO\s*&\s*/ig, '');
            n = n.replace(/PLANO\s*&\s*/ig, '');
            return n.trim();
        }

        function extrairChave(nome) {
            return nome.normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^A-Z0-9&]/g, "");
        }

        // --- INICIALIZAÇÃO ---
        async function carregarTudo() {
            const promessas = [
                fetch(API_URL_OP).then(r => r.json()),
                fetch(API_URL_TK).then(r => r.json()),
                fetch(API_URL_CL).then(r => r.json())
            ];
            const [op, tk, cl] = await Promise.all(promessas);
            db.op = op; db.tk = tk; db.cl = cl;

            // Datas Padrão
            const hoje = new Date().toISOString().split('T')[0];
            const primeiro = new Date(new Date().getFullYear(), new Date().getMonth(), 1).toISOString().split('T')[0];
            
            document.querySelectorAll('[id^="data-inicio"]').forEach(el => el.value = primeiro);
            document.querySelectorAll('[id^="data-fim"]').forEach(el => el.value = hoje);

            // Popula lista de agentes
            const agentes = [...new Set(db.op.map(i => i.agente))].sort();
            const list = document.getElementById('list-agentes-op');
            list.innerHTML = agentes.map(a => `<div class="custom-option" onclick="selecionarAgenteOp('${a}')">${a}</div>`).join('');
            if(agentes[0]) selecionarAgenteOp(agentes[0]);
        }

        window.onload = carregarTudo;

        // --- NAVEGAÇÃO ---
        function abrirTela(modulo) {
            moduloAtivo = modulo;
            document.getElementById('tela-menu').classList.add('view-hidden-left');
            document.querySelectorAll('.tela-relatorio').forEach(t => t.classList.remove('view-active'));
            document.getElementById('tela-' + modulo).classList.add('view-active');
            
            if(modulo === 'operacao') renderizarOperacao();
            if(modulo === 'tallk') renderizarTallk();
            if(modulo === 'ranking') renderizarRanking();
        }

        function voltarParaMenu() {
            document.querySelectorAll('.tela-relatorio').forEach(t => t.classList.remove('view-active'));
            document.getElementById('tela-menu').classList.remove('view-hidden-left');
        }

        function toggleCustomSelect(id) {
            const el = document.getElementById(id);
            el.style.display = el.style.display === 'block' ? 'none' : 'block';
        }

        function toggleCard(header) {
            const body = header.nextElementSibling;
            const arrow = header.querySelector('.toggle-arrow');
            const isHidden = body.style.display === 'none';
            body.style.display = isHidden ? 'block' : 'none';
            arrow.style.transform = isHidden ? 'rotate(0deg)' : 'rotate(-90deg)';
        }

        // --- LÓGICA OPERAÇÃO ---
        function mudarAbaOp(aba) {
            abaOpAtiva = aba;
            document.getElementById('aba-agentes').classList.toggle('active', aba === 'agentes');
            document.getElementById('aba-empreendimentos').classList.toggle('active', aba === 'empreendimentos');
            renderizarOperacao();
        }

        function mudarSortOp(sort) {
            sortOpAtivo = sort;
            document.querySelectorAll('#area-sort-op .sort-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-sort-' + sort).classList.add('active');
            document.getElementById('select-individual-wrapper').style.display = sort === 'individual' ? 'block' : 'none';
            document.getElementById('filtro-data-op').style.display = (sort === 'mes' || sort === 'individual') ? 'none' : 'flex';
            renderizarOperacao();
        }

        function selecionarAgenteOp(nome) {
            agenteOpSel = nome;
            document.querySelector('#select-individual-wrapper .custom-select-display').innerText = nome + ' ▼';
            document.getElementById('list-agentes-op').style.display = 'none';
            renderizarOperacao();
        }

        function renderizarOperacao() {
            document.getElementById('loading-operacao').style.display = 'none';
            document.getElementById('conteudo-operacao').style.display = 'block';
            const lista = document.getElementById('lista-operacao');
            lista.innerHTML = '';

            const d1 = document.getElementById('data-inicio-op').value;
            const d2 = document.getElementById('data-fim-op').value;

            // Mapa de Inadimplência
            let mapCl = {};
            db.cl.forEach(c => mapCl[extrairChave(c.empreendimento)] = c);

            if (abaOpAtiva === 'agentes') {
                if (sortOpAtivo === 'individual') {
                    // Histórico Mensal do Agente
                    let res = {};
                    db.op.filter(i => i.agente === agenteOpSel).forEach(i => {
                        let m = i.data.substring(0,7);
                        if(!res[m]) res[m] = { val:0, ac:0 };
                        res[m].val += i.valor; res[m].ac++;
                    });
                    Object.entries(res).sort((a,b) => b[0].localeCompare(a[0])).forEach(([mes, d]) => {
                        let partes = mes.split('-');
                        lista.innerHTML += `<div class="glass-card"><div class="kpi-row"><span class="kpi-label">📅 ${nomesMeses[parseInt(partes[1])]} / ${partes[0]}</span><span class="kpi-value">${fmtMoeda.format(d.val)}</span></div><div class="kpi-row"><span class="kpi-label">Acordos:</span><span class="kpi-value" style="color:#fff">${d.ac}</span></div></div>`;
                    });
                } else {
                    // Listagem Agrupada de Agentes
                    let res = {};
                    db.op.filter(i => i.data >= d1 && i.data <= d2).forEach(i => {
                        if(!res[i.agente]) res[i.agente] = { val:0, ac:0 };
                        res[i.agente].val += i.valor; res[i.agente].ac++;
                    });
                    let arr = Object.entries(res).map(([n, d]) => ({nome: n, ...d}));
                    if(sortOpAtivo === 'valor') arr.sort((a,b) => b.val - a.val);
                    else arr.sort((a,b) => b.ac - a.ac);

                    arr.forEach(i => {
                        lista.innerHTML += `<div class="glass-card"><div class="kpi-row"><span class="kpi-label" style="color:#fff; font-weight:bold;">👤 ${i.nome}</span><span class="kpi-value">${fmtMoeda.format(i.val)}</span></div><div class="kpi-row"><span class="kpi-label">Acordos Fechados:</span><span class="kpi-value" style="color:#a0aab5">${i.ac}</span></div></div>`;
                    });
                }
            } else {
                if (sortOpAtivo === 'mes') {
                    // Mês a Mês Empreendimentos
                    let res = {};
                    db.op.forEach(i => {
                        let m = i.data.substring(0,7);
                        if(!res[m]) res[m] = { val:0, ac:0, emps: {} };
                        res[m].val += i.valor; res[m].ac++;
                        let k = extrairChave(i.empreendimento);
                        if(!res[m].emps[k]) res[m].emps[k] = { nome: i.empreendimento, val:0, ac:0 };
                        res[m].emps[k].val += i.valor; res[m].emps[k].ac++;
                    });
                    Object.entries(res).sort((a,b) => b[0].localeCompare(a[0])).forEach(([mes, d]) => {
                        let partes = mes.split('-');
                        let subHtml = Object.values(d.emps).sort((a,b) => b.val - a.val).map(e => `<div class="sub-agent-row"><span>${mascaraNomeCurto(e.nome)}</span><span>${fmtMoeda.format(e.val)}</span></div>`).join('');
                        lista.innerHTML += `<div class="glass-card"><div class="card-header" onclick="toggleCard(this)"><div class="card-title">📅 ${nomesMeses[parseInt(partes[1])]} / ${partes[0]}</div><div class="toggle-arrow">▼</div></div><div class="card-body" style="display:none"><div class="kpi-row"><span class="kpi-label">Total do Mês:</span><span class="kpi-value">${fmtMoeda.format(d.val)}</span></div><div class="section-title">Detalhamento:</div>${subHtml}</div></div>`;
                    });
                } else {
                    // Cards Detalhados com Inadimplência e %
                    let res = {};
                    db.op.filter(i => i.data >= d1 && i.data <= d2).forEach(i => {
                        let k = extrairChave(i.empreendimento);
                        if(!res[k]) res[k] = { nome: i.empreendimento, val:0, ac:0, ags:{} };
                        res[k].val += i.valor; res[k].ac++;
                        if(!res[k].ags[i.agente]) res[k].ags[i.agente] = { val:0, ac:0 };
                        res[k].ags[i.agente].val += i.valor; res[k].ags[i.agente].ac++;
                    });
                    Object.values(res).sort((a,b) => b.val - a.val).forEach(emp => {
                        let cl = mapCl[extrairChave(emp.nome)] || { valorDevedor:0, qtdClientes:0 };
                        let percD = cl.valorDevedor > 0 ? ((emp.val / cl.valorDevedor) * 100).toFixed(1) + '%' : '0.0%';
                        let percC = cl.qtdClientes > 0 ? ((emp.ac / cl.qtdClientes) * 100).toFixed(1) + '%' : '0.0%';
                        let subAgs = Object.entries(emp.ags).sort((a,b) => b[1].val - a[1].val).map(([n, d]) => `<div class="sub-agent-row"><span>${n} (${d.ac} ac.)</span><span>${fmtMoeda.format(d.val)}</span></div>`).join('');
                        
                        lista.innerHTML += `<div class="glass-card">
                            <div class="card-header" onclick="toggleCard(this)"><div class="card-title">🏢 ${mascaraNomeCurto(emp.nome)}</div><div class="toggle-arrow">▼</div></div>
                            <div class="card-body" style="display:none">
                                <div class="kpi-row"><span class="kpi-label">Inadimplência total:</span><span class="kpi-value" style="color:#ff6b6b">${fmtMoeda.format(cl.valorDevedor)}</span></div>
                                <div class="kpi-row" style="margin-bottom:8px;"><span class="kpi-label">Total de Clientes Inad.:</span><span class="kpi-value" style="color:#a0aab5">${cl.qtdClientes}</span></div>
                                <div style="border-top:1px dashed #333; padding-top:8px;">
                                    <div class="kpi-row"><span class="kpi-label">Total de Acordos:</span><span class="kpi-value" style="color:#fff">${emp.ac}</span></div>
                                    <div class="kpi-row"><span class="kpi-label">Valor Total em Acordo:</span><span class="kpi-value">${fmtMoeda.format(emp.val)}</span></div>
                                    <div class="kpi-row"><span class="kpi-label">Clientes com Acordo:</span><span class="kpi-value" style="color:#4CAF50">${percC}</span></div>
                                    <div class="kpi-row"><span class="kpi-label">Débito Negociado:</span><span class="kpi-value" style="color:#4CAF50">${percD}</span></div>
                                </div>
                                <div class="section-title">Equipe:</div>${subAgs}
                            </div>
                        </div>`;
                    });
                }
            }
        }

        // --- LÓGICA TALLK ---
        function renderizarTallk() {
            document.getElementById('loading-tallk').style.display = 'none';
            document.getElementById('conteudo-tallk').style.display = 'block';
            const lista = document.getElementById('lista-tallk');
            lista.innerHTML = '';
            const d1 = document.getElementById('data-inicio-tk').value;
            const d2 = document.getElementById('data-fim-tk').value;

            let res = {};
            db.tk.filter(i => i.data >= d1 && i.data <= d2).forEach(i => {
                if(!res[i.agente]) res[i.agente] = { int:0, seg:0, alo:0, cpc:0 };
                res[i.agente].int += i.interacoes;
                res[i.agente].seg += i.duracaoSegundos;
                res[i.agente].alo += i.alo;
                res[i.agente].cpc += i.cpc;
            });

            Object.entries(res).sort((a,b) => b[1].int - a[1].int).forEach(([n, d]) => {
                let tma = d.int > 0 ? Math.floor(d.seg / d.int) : 0;
                lista.innerHTML += `<div class="glass-card">
                    <div class="kpi-row"><span class="kpi-label" style="color:#fff; font-weight:bold;">👤 ${n}</span><span class="kpi-value">${d.int} int.</span></div>
                    <div class="kpi-row"><span class="kpi-label">TMA Indiv.:</span><span class="kpi-value" style="color:#a0aab5">${Math.floor(tma/60)}:${(tma%60).toString().padStart(2,'0')}</span></div>
                    <div class="kpi-row"><span class="kpi-label">Alô / CPC (Voz):</span><span class="kpi-value" style="font-size:0.8rem;">${d.alo} / ${d.cpc}</span></div>
                </div>`;
            });
        }

        // --- LÓGICA RANKING ---
        function mudarAbaRank(aba) { abaRankAtiva = aba; document.getElementById('aba-rank-ag').classList.toggle('active', aba === 'agentes'); document.getElementById('aba-rank-em').classList.toggle('active', aba === 'empreendimentos'); renderizarRanking(); }

        function renderizarRanking() {
            document.getElementById('loading-ranking').style.display = 'none';
            document.getElementById('conteudo-ranking').style.display = 'block';
            const areaPodio = document.getElementById('area-podio');
            const areaLista = document.getElementById('lista-ranking');
            const d1 = document.getElementById('data-inicio-rk').value;
            const d2 = document.getElementById('data-fim-rk').value;

            let res = {};
            if(abaRankAtiva === 'agentes') {
                db.op.filter(i => i.data >= d1 && i.data <= d2).forEach(i => {
                    if(!res[i.agente]) res[i.agente] = { val:0, ac:0 };
                    res[i.agente].val += i.valor; res[i.agente].ac++;
                });
            } else {
                db.op.filter(i => i.data >= d1 && i.data <= d2).forEach(i => {
                    let k = extrairChave(i.empreendimento);
                    if(!res[k]) res[k] = { nome: i.empreendimento, val:0, ac:0 };
                    res[k].val += i.valor; res[k].ac++;
                });
            }

            let arr = Object.entries(res).map(([k, d]) => ({
                nome: abaRankAtiva === 'agentes' ? k : mascaraNomeCurto(d.nome),
                val: d.val,
                metrica: `${fmtMoeda.format(d.val)}<br><span style='font-weight:normal; font-size:0.6rem;'>(${d.ac} acordos)</span>`
            })).sort((a,b) => b.val - a.val);

            // Rank Denso (Empates)
            if(arr.length > 0) {
                let curR = 1; arr[0].r = 1;
                for(let i=1; i<arr.length; i++){
                    if(arr[i].val < arr[i-1].val) curR++;
                    arr[i].r = curR;
                }
            }

            // Render Podio
            let r1 = arr.filter(i => i.r === 1), r2 = arr.filter(i => i.r === 2), r3 = arr.filter(i => i.r === 3);
            const getNames = (a) => a.length > 2 ? `${a.length} Empatados` : a.map(x => x.nome).join('<br>');
            
            areaPodio.innerHTML = `<div class="podium-wrapper">
                <div class="podium-col podium-col-2"><div class="podium-name">${getNames(r2)}</div><div class="podium-metric">${r2[0]?r2[0].metrica:''}</div><div class="podium-step podium-2">2</div></div>
                <div class="podium-col podium-col-1"><div class="podium-name" style="font-size:0.75rem;">${getNames(r1)}</div><div class="podium-metric">${r1[0]?r1[0].metrica:''}</div><div class="podium-step podium-1">1</div></div>
                <div class="podium-col podium-col-3"><div class="podium-name">${getNames(r3)}</div><div class="podium-metric">${r3[0]?r3[0].metrica:''}</div><div class="podium-step podium-3">3</div></div>
            </div>`;

            areaLista.innerHTML = arr.filter(i => i.r > 3).map(i => `<div class="ranking-list-item"><div class="rank-pos">${i.r}º</div><div class="rank-info"><div class="rank-name">${i.nome}</div><div class="rank-metrics">${fmtMoeda.format(i.val)}</div></div></div>`).join('');
        }

        // --- EXPORTAÇÃO ---
        function exportarExcel() {
            const d1 = document.getElementById('data-inicio-op').value;
            const d2 = document.getElementById('data-fim-op').value;
            let data = [];
            
            if(moduloAtivo === 'operacao') {
                data = db.op.filter(i => i.data >= d1 && i.data <= d2).map(i => ({
                    Data: i.data, Agente: i.agente, Empreendimento: i.empreendimento, Valor: i.valor
                }));
            } else {
                data = db.tk.filter(i => i.data >= d1 && i.data <= d2);
            }

            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "DADOS_BI");
            XLSX.writeFile(wb, `JBLAR_${moduloAtivo}_BI.xlsx`);
        }

        function exportarPDF(id) {
            const el = document.getElementById(id);
            const opt = { margin:5, filename:`JBLAR_${moduloAtivo}.pdf`, image:{type:'jpeg', quality:0.98}, html2canvas:{scale:2, backgroundColor:'#030812'}, jsPDF:{unit:'mm', format:'a4', orientation:'portrait'} };
            
            // Oculta botões no PDF
            const buttons = el.querySelector('.export-group');
            const voltar = el.querySelector('.btn-voltar');
            buttons.style.display = 'none'; voltar.style.display = 'none';

            html2pdf().set(opt).from(el).save().then(() => {
                buttons.style.display = 'flex'; voltar.style.display = 'block';
            });
        }
    </script>
</body>
</html>
